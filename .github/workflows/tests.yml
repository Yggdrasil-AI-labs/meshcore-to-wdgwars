name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        # CI runners never have a real WDGoWars key, so the live-key
        # safety guard is a no-op here. Setting it explicitly tags
        # intent for the day CI runs on self-hosted hardware.
        env:
          HEIMDALL_TEST_ALLOW_LIVE_KEY: "1"
        run: python -m unittest discover -s tests -v

      - name: Smoke-test CLI
        run: |
          python heimdall.py examples/sample.csv --preview | head -3
